<!DOCTYPE html>
<html>
<head>
    <title>Edit Project</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="app-shell">

    <a class="back-link" href="/project/{{ project.id }}">← Back to Project</a>

    <header class="hero small-hero">
        <div>
            <p class="eyebrow">Edit Project</p>
            <h1>Edit {{ project.name }}</h1>
            <p class="subtitle">Change the project name, description, or icon.</p>
        </div>
    </header>

    <form class="form-card" method="POST">
        <label>Project Icon</label>
        <select name="icon" required>
            <option value="🎮" {% if project.icon == "🎮" %}selected{% endif %}>🎮 Game / Development</option>
            <option value="💼" {% if project.icon == "💼" %}selected{% endif %}>💼 Business</option>
            <option value="🛒" {% if project.icon == "🛒" %}selected{% endif %}>🛒 Ecommerce / Amazon</option>
            <option value="📦" {% if project.icon == "📦" %}selected{% endif %}>📦 Product / Inventory</option>
            <option value="📊" {% if project.icon == "📊" %}selected{% endif %}>📊 Analytics / Data</option>
            <option value="🌐" {% if project.icon == "🌐" %}selected{% endif %}>🌐 Website</option>
            <option value="🚀" {% if project.icon == "🚀" %}selected{% endif %}>🚀 Launch</option>
            <option value="🧠" {% if project.icon == "🧠" %}selected{% endif %}>🧠 Ideas / Learning</option>
            <option value="📱" {% if project.icon == "📱" %}selected{% endif %}>📱 App / Mobile</option>
            <option value="💻" {% if project.icon == "💻" %}selected{% endif %}>💻 Coding / Software</option>
            <option value="🎯" {% if project.icon == "🎯" %}selected{% endif %}>🎯 Goals</option>
            <option value="📅" {% if project.icon == "📅" %}selected{% endif %}>📅 Planning</option>
            <option value="🏠" {% if project.icon == "🏠" %}selected{% endif %}>🏠 Personal</option>
        </select>

        <label>Project Name</label>
        <input name="name" value="{{ project.name }}" required>

        <label>Description</label>
        <textarea name="description" required>{{ project.description }}</textarea>

        <button type="submit">Save Changes</button>
    </form>

    <form class="danger-card" method="POST" action="/delete-project/{{ project.id }}">
        <h2>Delete Project</h2>
        <p>This will permanently delete this project and all updates inside it.</p>
        <button class="danger-button" type="submit" onclick="return confirm('Are you sure you want to delete this project and all its updates?');">
            Delete Project
        </button>
    </form>

</div>
</body>
</html>
