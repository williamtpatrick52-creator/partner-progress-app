<!DOCTYPE html>
<html>
<head>
    <title>Edit Project</title>

    <style>
        body {
            font-family: Arial;
            background-color: #0f1115;
            color: white;
            padding: 20px;
        }

        .card {
            background: #1a1d23;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px;
            background: #ffc107;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        a {
            color: white;
        }
    </style>
</head>

<body>

<h2>Edit Project</h2>

<div class="card">

<form method="POST">

    <label>Project Name</label>
    <input type="text" name="name" value="{{ project.name }}" required>

    <label>Icon</label>
    <input type="text" name="icon" value="{{ project.icon }}">

    <button type="submit">Save Changes</button>

</form>

</div>

<br>
<a href="/dashboard">← Back</a>

</body>
</html>
