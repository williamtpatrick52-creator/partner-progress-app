<!DOCTYPE html>
<html>
<head>
    <title>Edit Task</title>

    <style>
        body {
            font-family: Arial;
            background-color: #0f1115;
            color: white;
            padding: 20px;
        }

        .card {
            background: #1a1d23;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px;
            background: #ffc107;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        a {
            color: white;
        }
    </style>
</head>

<body>

<h2>Edit Task</h2>

<div class="card">

<form method="POST">

    <label>Task</label>
    <input type="text" name="text" value="{{ task.text }}">

    <label>Status</label>
    <select name="status">
        <option value="attention" {% if task.status == "attention" %}selected{% endif %}>🚨 Needs Attention</option>
        <option value="pending" {% if task.status == "pending" %}selected{% endif %}>⚠️ Pending</option>
        <option value="done" {% if task.status == "done" %}selected{% endif %}>✅ Done</option>
    </select>

    <button type="submit">Save Changes</button>

</form>

</div>

<br>
<a href="/dashboard">← Back</a>

</body>
</html>
