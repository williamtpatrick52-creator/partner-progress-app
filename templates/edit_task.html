<!DOCTYPE html>
<html>
<head>
    <title>Edit Task</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="app-shell">

    <a class="back-link" href="/dashboard">← Back to Dashboard</a>

    <header class="hero small-hero">
        <div>
            <p class="eyebrow">Priority List</p>
            <h1>Edit Task</h1>
            <p class="subtitle">Update the task text or status.</p>
        </div>
    </header>

    <form class="form-card" method="POST">
        <label>Task</label>
        <input name="text" value="{{ task.text }}" required>

        <label>Status</label>
        <select name="status" required>
            <option value="Needs Attention" {% if task.status == "Needs Attention" %}selected{% endif %}>🔴 Needs Attention</option>
            <option value="Pending" {% if task.status == "Pending" %}selected{% endif %}>🟡 Pending</option>
            <option value="Possible" {% if task.status == "Possible" %}selected{% endif %}>🔔 Possible</option>
            <option value="Done" {% if task.status == "Done" %}selected{% endif %}>✅ Done</option>
        </select>

        <button type="submit">Save Task</button>
    </form>

    <form class="danger-card" method="POST" action="/delete-task/{{ task.id }}">
        <h2>Delete Task</h2>
        <p>This will permanently delete this task.</p>
        <button class="danger-button" type="submit" onclick="return confirm('Are you sure you want to delete this task?');">
            Delete Task
        </button>
    </form>

</div>
</body>
</html>
