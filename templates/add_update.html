<!DOCTYPE html>
<html>
<head>
    <title>Edit Update</title>

    <style>
        body {
            font-family: Arial;
            background-color: #0f1115;
            color: white;
            padding: 20px;
        }

        .card {
            background: #1a1d23;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
        }

        input, textarea, select {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px;
            background: #ffc107;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        a {
            color: white;
        }
    </style>
</head>

<body>

<h2>Edit Update</h2>

<div class="card">

<form method="POST">

    <label>Project</label>
    <select name="project_id">
        {% for p in projects %}
            <option value="{{ p.id }}" {% if p.id == update.project_id %}selected{% endif %}>
                {{ p.name }}
            </option>
        {% endfor %}
    </select>

    <label>Status</label>
    <input type="text" name="status" value="{{ update.status }}">

    <label>Note</label>
    <textarea name="note">{{ update.note }}</textarea>

    <button type="submit">Save Changes</button>

</form>

</div>

<br>
<a href="/dashboard">← Back</a>

</body>
</html>
