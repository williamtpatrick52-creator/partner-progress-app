<!DOCTYPE html>
<html>
<head>
    <title>Edit Update</title>
</head>
<body>

<h2>Edit Update</h2>

<form method="POST">
    <label>Project</label>
    <select name="project_id">
        {% for p in projects %}
            <option value="{{ p.id }}" {% if p.id == update.project_id %}selected{% endif %}>
                {{ p.name }}
            </option>
        {% endfor %}
    </select>

    <br><br>

    <label>Status</label>
    <select name="status">
        <option {% if update.status == "In Progress" %}selected{% endif %}>In Progress</option>
        <option {% if update.status == "Needs Attention" %}selected{% endif %}>Needs Attention</option>
        <option {% if update.status == "Pending" %}selected{% endif %}>Pending</option>
        <option {% if update.status == "Done" %}selected{% endif %}>Done</option>
    </select>

    <br><br>

    <textarea name="note">{{ update.note }}</textarea>

    <br><br>

    <button type="submit">Save</button>
</form>

</body>
</html>
