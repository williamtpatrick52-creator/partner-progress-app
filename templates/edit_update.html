<!DOCTYPE html>
<html>
<head>
    <title>Edit Update</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="app-shell">

    <a class="back-link" href="/dashboard">← Back to Dashboard</a>

    <header class="hero small-hero">
        <div>
            <p class="eyebrow">Edit Progress Note</p>
            <h1>Edit Update</h1>
            <p class="subtitle">Change the project, status, note, or image.</p>
        </div>
    </header>

    <form class="form-card" method="POST" enctype="multipart/form-data">
        <label>Project</label>
        <select name="project_id" required>
            {% for project in projects %}
                <option value="{{ project.id }}" {% if project.id == update.project_id %}selected{% endif %}>
                    {{ project.icon }} {{ project.name }}
                </option>
            {% endfor %}
        </select>

        <label>Status</label>
        <select name="status" required>
            <option {% if update.status == "Not Started" %}selected{% endif %}>Not Started</option>
            <option {% if update.status == "In Progress" %}selected{% endif %}>In Progress</option>
            <option {% if update.status == "Blocked" %}selected{% endif %}>Blocked</option>
            <option {% if update.status == "Done" %}selected{% endif %}>Done</option>
        </select>

        <label>Update</label>
        <textarea name="note" required>{{ update.note }}</textarea>

        {% if update.image %}
            <p class="current-image-label">Current image:</p>
            <img class="update-image" src="/static/uploads/{{ update.image }}" alt="Update image">
        {% endif %}

        <label>Add/Replace Image</label>
        <input type="file" name="image" accept="image/*">

        <button type="submit">Save Update Changes</button>
    </form>

    <form class="danger-card" method="POST" action="/delete-update/{{ update.id }}">
        <h2>Delete Update</h2>
        <p>This will permanently delete this update.</p>
        <button class="danger-button" type="submit" onclick="return confirm('Are you sure you want to delete this update?');">
            Delete Update
        </button>
    </form>

</div>
</body>
</html>
